name: image_gen_cli
description: >
  CLI for generating images with OpenAI's GPT-Image models, reusing the
  ChatGPT-subscription credentials stored by the Codex CLI (~/.codex/auth.json),
  with an OpenAI API-key fallback.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0

executables:
  image-gen: image_gen

dependencies:
  args: ^2.6.0
  http: ^1.2.0

dev_dependencies:
  crypto: ^3.0.0
  lints: ^5.0.0
  test: ^1.25.0
